<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird Azure 1.2</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #1a1a2e;
    --sky2: #16213e;
    --neon-cyan: #00f5ff;
    --neon-green: #39ff14;
    --neon-pink: #ff2d78;
    --neon-yellow: #ffe600;
    --pipe-color: #00b300;
    --pipe-dark: #007a00;
    --ground: #8b5e3c;
    --ground-dark: #5a3a1a;
    --panel-bg: rgba(0,0,0,0.75);
    --azure-blue: #0078d4;
    --azure-light: #50e6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--sky);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #wrapper {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* GAME AREA */
  #game-area {
    position: relative;
  }

  canvas {
    display: block;
    border: 3px solid var(--neon-cyan);
    box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(0,245,255,0.2);
    border-radius: 4px;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,30,0.88);
    border-radius: 4px;
    transition: opacity 0.3s;
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    color: var(--neon-cyan);
    text-shadow: 0 0 12px var(--neon-cyan), 0 0 30px var(--neon-cyan);
    margin-bottom: 12px;
    letter-spacing: 2px;
  }

  #overlay .subtitle {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: var(--neon-yellow);
    margin-bottom: 28px;
    letter-spacing: 1px;
  }

  #overlay .score-display {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--neon-green);
    margin-bottom: 8px;
  }

  #overlay .best-display {
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: #aaa;
    margin-bottom: 28px;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 12px 24px;
    border: 2px solid var(--neon-cyan);
    background: transparent;
    color: var(--neon-cyan);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    margin: 6px;
    text-transform: uppercase;
  }
  .btn:hover {
    background: var(--neon-cyan);
    color: #000;
    box-shadow: 0 0 16px var(--neon-cyan);
  }
  .btn.pink {
    border-color: var(--neon-pink);
    color: var(--neon-pink);
  }
  .btn.pink:hover {
    background: var(--neon-pink);
    color: #000;
    box-shadow: 0 0 16px var(--neon-pink);
  }

  /* NAME INPUT */
  #name-section {
    margin-bottom: 20px;
    text-align: center;
  }
  #name-section label {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #aaa;
    display: block;
    margin-bottom: 6px;
  }
  #player-name {
    background: rgba(255,255,255,0.05);
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 8px 12px;
    text-align: center;
    outline: none;
    width: 200px;
    letter-spacing: 1px;
  }

  /* LEADERBOARD PANEL */
  #leaderboard-panel {
    width: 280px;
    background: var(--panel-bg);
    border: 2px solid var(--azure-blue);
    box-shadow: 0 0 20px rgba(0,120,212,0.4);
    border-radius: 4px;
    overflow: hidden;
    min-height: 400px;
  }

  .panel-header {
    background: var(--azure-blue);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-header .azure-logo {
    width: 20px; height: 20px;
  }
  .panel-header span {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: white;
    letter-spacing: 0.5px;
  }
  .panel-header small {
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: var(--azure-light);
    margin-left: auto;
  }

  #scores-list {
    list-style: none;
    padding: 8px 0;
  }

  #scores-list li {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    gap: 10px;
    transition: background 0.15s;
  }
  #scores-list li:hover { background: rgba(255,255,255,0.04); }

  .rank {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #555;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .rank.gold   { color: #ffd700; text-shadow: 0 0 6px #ffd700; }
  .rank.silver { color: #c0c0c0; }
  .rank.bronze { color: #cd7f32; }

  .score-name {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #ddd;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .score-name.me { color: var(--neon-green); }

  .score-pts {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--neon-yellow);
  }

  .score-date {
    font-family: 'VT323', monospace;
    font-size: 13px;
    color: #444;
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }

  #lb-status {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: #555;
    text-align: center;
    padding: 20px;
  }
  #lb-status.error { color: var(--neon-pink); }
  #lb-status.ok    { color: var(--neon-green); }

  /* API CONFIG */
  #api-config {
    padding: 12px 16px;
    border-top: 1px solid rgba(0,120,212,0.3);
  }
  #api-config label {
    font-family: 'VT323', monospace;
    font-size: 13px;
    color: #666;
    display: block;
    margin-bottom: 4px;
  }
  #api-url {
    background: rgba(255,255,255,0.04);
    border: 1px solid #333;
    color: #888;
    font-family: 'VT323', monospace;
    font-size: 13px;
    padding: 5px 8px;
    width: 100%;
    outline: none;
  }
  #api-url:focus { border-color: var(--azure-blue); color: #ccc; }

  /* LIVE SCORE */
  #live-score {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    color: white;
    text-shadow: 2px 2px 0 #000, 0 0 12px var(--neon-cyan);
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="wrapper">
  <div id="game-area">
    <canvas id="canvas" width="360" height="600"></canvas>
    <div id="live-score">0</div>

    <!-- OVERLAY -->
    <div id="overlay">
      <h1>FLAPPY<br>BIRD</h1>
      <div class="subtitle">☁ Azure Edition ☁</div>

      <div id="name-section">
        <label>EL TEU NOM</label>
        <input type="text" id="player-name" maxlength="12" placeholder="PLAYER1" autocomplete="off" />
      </div>

      <div id="score-display-overlay" style="display:none">
        <div class="score-display" id="final-score-text">PUNTUACIÓ: 0</div>
        <div class="best-display" id="final-best-text">MILLOR: 0</div>
      </div>

      <div style="display:flex; flex-wrap:wrap; justify-content:center;">
        <button class="btn" onclick="startGame()">▶ JUGAR</button>
        <button class="btn pink" onclick="loadLeaderboard()">🏆 RÀNKING</button>
      </div>

      <div style="margin-top:14px; font-family:'VT323',monospace; font-size:14px; color:#444;">
        ESPAI / CLICK / TAP per saltar
      </div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div id="leaderboard-panel">
    <div class="panel-header">
      <svg class="azure-logo" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M33.4 6.4L0 73.6h18.4l9.2-17.6H48L33.4 6.4z" fill="#0078d4"/>
        <path d="M36.8 14.4L16 56h22.4l30.4 30.4L96 73.6 50.4 14.4H36.8z" fill="#50e6ff"/>
      </svg>
      <span>AZURE LEADERBOARD</span>
      <small id="lb-count"></small>
    </div>

    <ul id="scores-list">
      <li><span id="lb-status">Carregant...</span></li>
    </ul>

    <div id="api-config">
      <label>🔗 Azure Function URL</label>
      <input type="text" id="api-url" placeholder="https://tu-func.azurewebsites.net/api/scores" />
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────
const GRAVITY    = 0.05;
const JUMP_FORCE = -2.0;
const PIPE_SPEED = 1.5;
const PIPE_GAP   = 180;
const PIPE_FREQ  = 90; // frames between pipes
const GROUND_H   = 80;
const BIRD_SIZE  = 28;

// ─── STATE ────────────────────────────────────────────────────────────────
let canvas, ctx, animId;
let state = 'idle'; // idle | playing | dead
let bird, pipes, score, best, frame;
let stars = [];
let cloudParticles = [];

// ─── INIT CANVAS ──────────────────────────────────────────────────────────
window.onload = () => {
  canvas = document.getElementById('canvas');
  ctx    = canvas.getContext('2d');
  best   = parseInt(localStorage.getItem('flappy_best') || '0');

  // Stars
  for (let i = 0; i < 60; i++) {
    stars.push({ x: Math.random()*360, y: Math.random()*520, r: Math.random()*1.5+0.3, a: Math.random() });
  }

  // Input
  document.addEventListener('keydown', e => { if (e.code === 'Space') handleInput(); });
  canvas.addEventListener('click', handleInput);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(); }, {passive:false});

  loadLeaderboard();
  drawIdleScreen();
};

function drawIdleScreen() {
  drawBackground(0);
  drawGround();
  drawBirdAt(80, 280, 0);
}

// ─── GAME LOOP ─────────────────────────────────────────────────────────────
function startGame() {
  bird  = { x: 80, y: 250, vy: 0, angle: 0 };
  pipes = [];
  score = 0;
  frame = 0;
  state = 'playing';

  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('live-score').textContent = '0';

  cancelAnimationFrame(animId);
  loop();
}

function loop() {
  update();
  draw();
  if (state === 'playing') animId = requestAnimationFrame(loop);
}

function update() {
  frame++;

  // Bird physics
  bird.vy += GRAVITY;
  bird.y  += bird.vy;
  bird.angle = Math.max(-25, Math.min(90, bird.vy * 4.5));

  // Spawn pipes
  if (frame % PIPE_FREQ === 0) {
    const gapY = 120 + Math.random() * (600 - GROUND_H - PIPE_GAP - 120);
    pipes.push({ x: 380, gapY, scored: false });
  }

  // Move pipes
  for (let p of pipes) {
    p.x -= PIPE_SPEED;
    // Score
    if (!p.scored && p.x + 50 < bird.x) {
      p.scored = true;
      score++;
      document.getElementById('live-score').textContent = score;
    }
  }
  pipes = pipes.filter(p => p.x > -60);

  // Collision
  if (bird.y + BIRD_SIZE/2 > 600 - GROUND_H || bird.y - BIRD_SIZE/2 < 0) {
    die(); return;
  }
  for (let p of pipes) {
    if (checkPipeCollision(p)) { die(); return; }
  }
}

function checkPipeCollision(p) {
  const bx = bird.x, by = bird.y, br = BIRD_SIZE/2 - 4;
  const pw = 52;
  if (bx + br < p.x || bx - br > p.x + pw) return false;
  if (by - br > p.gapY && by + br < p.gapY + PIPE_GAP) return false;
  return true;
}

function die() {
  state = 'dead';
  document.getElementById('live-score').textContent = '';
  if (score > best) {
    best = score;
    localStorage.setItem('flappy_best', best);
  }
  // Submit score
  const name = document.getElementById('player-name').value.trim() || 'PLAYER1';
  submitScore(name, score);

  // Show overlay
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  document.getElementById('score-display-overlay').style.display = 'block';
  document.getElementById('final-score-text').textContent = `PUNTUACIÓ: ${score}`;
  document.getElementById('final-best-text').textContent  = `MILLOR: ${best}`;

  // Last frame
  draw();
  loadLeaderboard();
}

function handleInput() {
  if (state === 'playing') {
    bird.vy = JUMP_FORCE;
  }
}

// ─── DRAW ─────────────────────────────────────────────────────────────────
function draw() {
  drawBackground(frame);
  drawPipes();
  drawGround();
  drawBirdAt(bird.x, bird.y, bird.angle);
}

function drawBackground(f) {
  // Sky gradient
  const grad = ctx.createLinearGradient(0,0,0,520);
  grad.addColorStop(0, '#0a0a1f');
  grad.addColorStop(1, '#1a2040');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 360, 520);

  // Stars
  for (let s of stars) {
    s.a += 0.01;
    ctx.globalAlpha = 0.4 + 0.4 * Math.sin(s.a);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Background pipes effect (decorative clouds)
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fillRect(40 + Math.sin(f*0.003)*20, 80, 120, 30);
  ctx.fillRect(200 + Math.sin(f*0.004+1)*15, 140, 90, 22);
}

function drawGround() {
  const y = 600 - GROUND_H;
  // Main ground
  ctx.fillStyle = '#2d5a1b';
  ctx.fillRect(0, y, 360, 10);
  ctx.fillStyle = '#8b5e3c';
  ctx.fillRect(0, y+10, 360, GROUND_H - 10);
  // Dirt stripes
  ctx.fillStyle = '#5a3a1a';
  for (let i = 0; i < 360; i += 30) {
    ctx.fillRect(i, y+14, 18, 4);
  }
}

function drawBirdAt(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle * Math.PI / 180);

  // Body
  ctx.fillStyle = '#ffe600';
  ctx.beginPath();
  ctx.ellipse(0, 0, BIRD_SIZE/2, BIRD_SIZE/2 - 2, 0, 0, Math.PI*2);
  ctx.fill();

  // Wing
  ctx.fillStyle = '#ffb300';
  ctx.beginPath();
  ctx.ellipse(-4, 4, 10, 6, -0.3, 0, Math.PI*2);
  ctx.fill();

  // Eye
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(8, -5, 6, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(10, -5, 3, 0, Math.PI*2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#ff6b00';
  ctx.beginPath();
  ctx.moveTo(14, -1);
  ctx.lineTo(20, 2);
  ctx.lineTo(14, 5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawPipes(f) {
  for (let p of pipes) {
    const pw = 52;
    // TOP PIPE
    const topH = p.gapY;
    drawPipeShape(p.x, 0, pw, topH, true);
    // BOTTOM PIPE
    const botY = p.gapY + PIPE_GAP;
    drawPipeShape(p.x, botY, pw, 600 - GROUND_H - botY, false);
  }
}

function drawPipeShape(x, y, w, h, isTop) {
  // Main body
  ctx.fillStyle = '#3aaa35';
  ctx.fillRect(x, y, w, h);

  // Highlight
  ctx.fillStyle = '#5dd658';
  ctx.fillRect(x+4, y, 8, h);

  // Dark edge
  ctx.fillStyle = '#1e7a1a';
  ctx.fillRect(x+w-6, y, 6, h);

  // Cap
  const capH = 26, capW = w + 12, capX = x - 6;
  const capY = isTop ? h - capH : y;
  ctx.fillStyle = '#2e9b29';
  ctx.fillRect(capX, capY, capW, capH);
  ctx.fillStyle = '#5dd658';
  ctx.fillRect(capX+4, capY+2, 10, capH-4);
  ctx.fillStyle = '#1e7a1a';
  ctx.fillRect(capX+capW-8, capY, 8, capH);
}

// ─── API ──────────────────────────────────────────────────────────────────
function getApiUrl() {
  return 'https://flappybird-func-dmaje0btf9cfa2b2.swedencentral-01.azurewebsites.net/api/scores';
}

async function submitScore(name, pts) {
  const url = getApiUrl();
  if (!url) return;
  try {
    await fetch(url, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, score: pts })
    });
  } catch(e) {
    console.warn('Azure Function unreachable:', e.message);
  }
}

async function loadLeaderboard() {
  const url = getApiUrl();
  const list = document.getElementById('scores-list');
  const status = document.getElementById('lb-status');

  if (!url) {
    list.innerHTML = `<li><span id="lb-status" class="error" style="font-family:'VT323',monospace;font-size:15px;color:#666;padding:16px;display:block;text-align:center;">Configura la URL de la<br>Azure Function per veure<br>el rànking en línia</span></li>`;
    return;
  }

  list.innerHTML = `<li><span id="lb-status" style="font-family:'VT323',monospace;font-size:16px;color:#555;padding:16px;display:block;text-align:center;">Carregant...</span></li>`;

  try {
    const res  = await fetch(url + (url.includes('?') ? '&' : '?') + 'limit=10');
    const data = await res.json();
    renderLeaderboard(data);
  } catch(e) {
    list.innerHTML = `<li><span style="font-family:'VT323',monospace;font-size:15px;color:#ff2d78;padding:16px;display:block;text-align:center;">Error de connexió.<br>Comprova la URL.</span></li>`;
    document.getElementById('lb-count').textContent = '';
  }
}

function renderLeaderboard(scores) {
  const list = document.getElementById('scores-list');
  const myName = (document.getElementById('player-name').value.trim() || 'PLAYER1').toUpperCase();

  if (!scores || scores.length === 0) {
    list.innerHTML = `<li><span style="font-family:'VT323',monospace;font-size:16px;color:#555;padding:16px;display:block;text-align:center;">Sense puntuacions encara.<br>Sigues el primer! 🎮</span></li>`;
    document.getElementById('lb-count').textContent = '';
    return;
  }

  document.getElementById('lb-count').textContent = `TOP ${scores.length}`;

  const rankClasses = ['gold','silver','bronze'];
  const rankSymbols = ['🥇','🥈','🥉'];

  list.innerHTML = scores.map((s, i) => {
    const rc = rankClasses[i] || '';
    const sym = rankSymbols[i] || (i+1);
    const isMe = s.name && s.name.toUpperCase() === myName;
    const date = s.created_at ? new Date(s.created_at).toLocaleDateString('ca',{day:'2-digit',month:'2-digit'}) : '';
    return `
      <li>
        <span class="rank ${rc}">${sym}</span>
        <span class="score-name ${isMe?'me':''}">${s.name || '???'}</span>
        <span class="score-pts">${s.score}</span>
        <span class="score-date">${date}</span>
      </li>`;
  }).join('');
}
</script>
</body>
</html>
